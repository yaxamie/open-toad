services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-3131}:3131"
    environment:
      DATABASE_URL: postgres://opentoad:${POSTGRES_PASSWORD}@db:5432/opentoad
      PORT: "3131"
      POND_DOMAIN: ${POND_DOMAIN}
      POND_PRIVATE_KEY: ${POND_PRIVATE_KEY}
      POND_PUBLIC_KEY: ${POND_PUBLIC_KEY}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: opentoad
      POSTGRES_USER: opentoad
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opentoad"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
